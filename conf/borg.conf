# myVesta Borg Incremental Backup Configuration
# This file configures the new incremental backup system

#----------------------------------------------------------#
#                    Backup Paths                          #
#----------------------------------------------------------#

# Where user home directories are located
HOME_DIR=/home

# Where myVesta control panel files are stored
VESTA_DIR=/usr/local/vesta

# Server-level config directories
ETC_DIR=/etc
SCRIPTS_DIR=/root/scripts

# Main backup directory (must exist on myVesta servers)
BACKUP_DIR=/backup/borg

#----------------------------------------------------------#
#                Repository Layout                         #
#----------------------------------------------------------#

# Individual user repositories (one per user)
REPO_USERS_DIR=$BACKUP_DIR/home
REPO_DB_DIR=$BACKUP_DIR/db
REPO_VESTA_DIR=$BACKUP_DIR/vesta

# System-level repositories
REPO_ETC=$BACKUP_DIR/etc
REPO_SCRIPTS=$BACKUP_DIR/scripts

#----------------------------------------------------------#
#                Retention Policy                          #
#----------------------------------------------------------#

# Retention policy - how long to keep your backups
# 
# KEEP_WITHIN: Keep ALL backups from the last X days/weeks/months
#   Examples: "7d" = 7 days, "2w" = 2 weeks, "1m" = 1 month
#   If you make 10 backups per day, all 10 will be kept during this period
KEEP_WITHIN="7d"

# After KEEP_WITHIN period, keep only SELECTED backups:
#
# KEEP_DAILY: Keep ONE backup per day for X days
#   Example: 30 = Keep one daily backup for 30 days
#
# KEEP_WEEKLY: Keep ONE backup per week for X weeks
#   Example: 8 = Keep one weekly backup for 8 weeks (2 months)
#
# KEEP_MONTHLY: Keep ONE backup per month for X months
#   Example: 12 = Keep one monthly backup for 12 months (1 year)
#
# KEEP_YEARLY: Keep ONE backup per year for X years
#   Example: 2 = Keep one yearly backup for 2 years
#
# Set any to 0 to disable that level
KEEP_DAILY=30
KEEP_WEEKLY=8
KEEP_MONTHLY=12
KEEP_YEARLY=2

# ┌─────────────────────────────────────────────────────────────┐
# │ EXAMPLE: How your backups are kept with default settings   │
# ├─────────────────────────────────────────────────────────────┤
# │ Today          → ALL backups kept (even 10 per day!)        │
# │ Last 7 days    → ALL backups kept                           │
# │ 8-37 days ago  → 1 backup per day (30 total)                │
# │ 2-4 months ago → 1 backup per week (8 total)                │
# │ 5-16 months    → 1 backup per month (12 total)              │
# │ 1-2 years ago  → 1 backup per year (2 total)                │
# │ Older than 2y  → Deleted automatically                      │
# └─────────────────────────────────────────────────────────────┘
#
# TOTAL STORAGE: With daily backups, you'll have around 60 archives:
#   - 7 from last week (if you backup daily)
#   - 30 daily archives (1 per day for a month)
#   - 8 weekly archives (1 per week for 2 months)
#   - 12 monthly archives (1 per month for a year)
#   - 2 yearly archives (1 per year for 2 years)

#----------------------------------------------------------#
#                Borg Settings                             #
#----------------------------------------------------------#

# Encryption mode: "none" (default) or "repokey-blake2"
# none = no encryption (faster, but no security)
# repokey-blake2 = encrypted with passphrase (secure)
ENCRYPTION_MODE="none"

# Passphrase for encrypted repos (only used if ENCRYPTION_MODE != "none")
# IMPORTANT: Keep this secure! Store in a safe location
BORG_PASSPHRASE=""

# Compression mode: "lz4" (fast) or "zstd" (better ratio)
COMPRESSION_MODE="lz4"

# Borg options (constructed from above settings)
OPTIONS_INIT="--encryption=$ENCRYPTION_MODE"
OPTIONS_CREATE="-sv --compression $COMPRESSION_MODE"
OPTIONS_PRUNE="-v --keep-within=$KEEP_WITHIN --keep-daily=$KEEP_DAILY --keep-weekly=$KEEP_WEEKLY --keep-monthly=$KEEP_MONTHLY --keep-yearly=$KEEP_YEARLY"

# Environment variables for Borg (needed for cron jobs)
export BORG_UNKNOWN_UNENCRYPTED_REPO_ACCESS_IS_OK=yes
export HOME=/root

#----------------------------------------------------------#
#                Backup Mode                               #
#----------------------------------------------------------#

# Backup mode: "local", "remote", or "both"
# local  = backups stored in /backup/borg on this server
# remote = backups sent directly to remote server (e.g., Hetzner Storage Box)
# both   = backups stored locally AND rsynced to remote
BACKUP_MODE="local"

#----------------------------------------------------------#
#                Remote Backup Settings                    #
#----------------------------------------------------------#

# Remote backup server (used if BACKUP_MODE is "remote" or "both")
# Format for Hetzner Storage Box: u123456@u123456.your-storagebox.de
# Format for custom SSH: user@hostname
REMOTE_BACKUP_SERVER=""

# SSH port (default: 22; Hetzner Storage Box uses 23)
REMOTE_BACKUP_PORT="23"

# Remote directory path where borg repos will be stored
# Example for Hetzner: /home/borg
REMOTE_BACKUP_DIR="/home/borg"

# Remote backup password (optional - leave empty to use SSH key authentication)
# If set, sshpass will be used to authenticate (requires: apt-get install sshpass)
# For SSH key authentication (recommended), leave this empty and setup SSH keys
REMOTE_BACKUP_PASSWORD=""

# For "both" mode: sync method
# rsync = use rsync to mirror local backup to remote
# borg  = create separate remote borg repos
REMOTE_SYNC_METHOD="rsync"

#----------------------------------------------------------#
#                Exclusions                                #
#----------------------------------------------------------#

# Users to exclude from backup (comma-separated)
EXCLUDED_USERS=""

# Centralized exclusion patterns (applied to all user backups)
# These paths are relative to /home/USER/
EXCLUDE_PATTERNS=(
    "*/tmp"
    "*/cache"
    "*/.cache"
    "*/drush-backups"
    "web/*/public_html/wp-content/cache"
    "web/*/public_html/wp-content/uploads/cache"
    "web/*/public_html/sites/*/files/css"
    "web/*/public_html/sites/*/files/js"
    "web/*/public_html/sites/*/files/styles"
)

#----------------------------------------------------------#
#                Notifications                             #
#----------------------------------------------------------#

# Email address(es) for backup notifications (comma-separated)
# Receives email after EVERY backup run (success or failure) with clear status in subject
# Leave empty to disable notifications
NOTIFY_ADMIN_BACKUP=""

# Global report: include system-wide backup report in notification email
# daily  = include global report every day
# weekly = include global report once per week (on NOTIFY_GLOBAL_REPORT_WEEKDAY)
# never  = do not include global report (default)
NOTIFY_GLOBAL_REPORT="never"

# Day of week for weekly global report (0=Sunday, 1=Monday, ..., 6=Saturday)
NOTIFY_GLOBAL_REPORT_WEEKDAY="1"

#----------------------------------------------------------#
#                Monitoring & Reporting                    #
#----------------------------------------------------------#

# Disk space warning thresholds (percentage)
# System will warn when disk usage exceeds these thresholds
DISK_SPACE_WARNING_THRESHOLD=80
DISK_SPACE_CRITICAL_THRESHOLD=90

# Require per-user config file (yes/no)
# If set to "yes", each user must have /usr/local/vesta/data/users/USERNAME/borg-backup.conf
# If set to "no" (default), users without config file will use defaults (backward compatible)
REQUIRE_PER_USER_CONFIG="no"

#----------------------------------------------------------#
#                Advanced Settings                         #
#----------------------------------------------------------#

# Directory names
PUBLIC_HTML_DIR_NAME="public_html"
DB_DUMP_DIR_NAME="db_dump"

# MySQL repair before backup (yes/no)
MYSQL_REPAIR_BEFORE_BACKUP="yes"

# Archive naming format
ARCHIVE_DATE_FORMAT="%Y-%m-%d_%H-%M-%S"

# Log directory
LOG_DIR="/var/log/borg"

